name: 'Starlines'
description: 'Generate a starline SVG for a GitHub repository or gist'

inputs:
  resource:
    description: 'GitHub repository (owner/repo) or gist (owner/gist-id@gist)'
    required: true
  github-token:
    description: 'GitHub token with read access to the target repository or gist stargazers'
    required: true
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - shell: bash
      run: npm ci

    - shell: bash
      run: node create-starline.js "${{ inputs.resource }}"
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
