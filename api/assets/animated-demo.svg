<svg width="200" height="50" viewBox="0 0 210 50" xmlns="http://www.w3.org/2000/svg">
    <style>
        .hover-trigger {
            fill: transparent;
            cursor: pointer;
        }
        .interactive-group {
            pointer-events: bounding-box;
        }
        .interactive-group .star-popup,
        .interactive-group .confetti-particle {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
        }
        .interactive-group:hover .star-popup {
            visibility: visible;
            opacity: 1;
            transition: opacity 0.15s ease-in-out;
        }
        
        /* Extended Confetti Animation Timing */
        .interactive-group:hover .confetti-particle {
            visibility: visible;
            animation: burst 1.4s cubic-bezier(0.05, 0.7, 0.2, 1) forwards;
        }

        .popup-bg {
            fill: rgba(15, 23, 42, 0.9);
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1;
            rx: 4;
        }
        .popup-text {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 9px;
            font-weight: 600;
            fill: #ffffff;
            text-anchor: middle;
        }
        
        /* Extended Lifecycle Keyframes with a longer mid-air drift/fade phase */
        @keyframes burst {
            0% {
                opacity: 0;
                transform: translate(105px, 25px) scale(0) rotate(0deg);
            }
            8% {
                opacity: 1;
            }
            45% {
                opacity: 0.9;
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.8) rotate(var(--r));
            }
        }

        /* Color-rich palette additions matching neon theme criteria */
        .p1  { --tx: 65px;  --ty: 5px;   --r: 45deg;   fill: #FF007F; }
        .p2  { --tx: 80px;  --ty: -12px; --r: -30deg;  fill: #00F5FF; }
        .p3  { --tx: 100px; --ty: -18px; --r: 85deg;   fill: #FFD700; }
        .p4  { --tx: 125px; --ty: -15px; --r: 120deg;  fill: #39FF14; }
        .p5  { --tx: 145px; --ty: -2px;  --r: -45deg;  fill: #FF6600; }
        .p6  { --tx: 155px; --ty: 18px;  --r: 60deg;   fill: #CC00FF; }
        .p7  { --tx: 150px; --ty: 35px;  --r: -90deg;  fill: #00FFCC; }
        .p8  { --tx: 130px; --ty: 52px;  --r: 15deg;   fill: #FF0055; }
        .p9  { --tx: 105px; --ty: 58px;  --r: 200deg;  fill: #FFFF00; }
        .p10 { --tx: 80px;  --ty: 54px;  --r: -15deg;  fill: #00FF66; }
        .p11 { --tx: 60px;  --ty: 38px;  --r: 135deg;  fill: #FF3399; }
        .p12 { --tx: 52px;  --ty: 20px;  --r: -75deg;  fill: #6600FF; }
        .p13 { --tx: 85px;  --ty: 8px;   --r: 90deg;   fill: #00E5FF; }
        .p14 { --tx: 120px; --ty: 5px;   --r: -120deg; fill: #FF00AA; }
        .p15 { --tx: 128px; --ty: 28px;  --r: 40deg;   fill: #7FFF00; }
        .p16 { --tx: 75px;  --ty: 26px;  --r: -160deg; fill: #FF4500; }

        @media (prefers-color-scheme: light) {
            .popup-bg {
                fill: rgba(255, 255, 255, 0.95);
                stroke: rgba(15, 23, 42, 0.15);
                filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
            }
            .popup-text {
                fill: #0f172a;
            }
        }
    </style>

    <defs>
        <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop stop-color="#3023AE" offset="0%"/>
            <stop stop-color="#C86DD7" offset="100%"/>
        </linearGradient>
    </defs>
    <path stroke="url(#stroke)"
        stroke-width="3"
        stroke-linejoin="round"
        stroke-linecap="round"
        d="M5.00 46.0001 C 6.39 45.43, 8.71 44.71, 10.00 43.94 S 13.70 40.78, 15.00 40.02 S 18.66 38.79, 20.00 38.13 S 23.59 35.54, 25.00 35.04 S 28.51 34.75, 30.00 34.57 S 33.61 34.37, 35.00 33.81 S 38.53 30.80, 40.00 30.48 S 43.51 31.55, 45.00 31.67 S 48.52 31.57, 50.00 31.31 S 53.51 30.08, 55.00 29.91 S 58.51 30.30, 60.00 30.13 S 63.56 29.20, 65.00 28.79 S 68.51 27.45, 70.00 27.30 S 73.57 28.29, 75.00 27.83 S 78.58 24.52, 80.00 24.04 S 83.52 24.73, 85.00 24.48 S 88.50 22.49, 90.00 22.37 S 93.59 24.18, 95.00 23.68 S 98.64 19.46, 100.00 18.84 S 103.50 19.17, 105.00 19.08 S 108.55 17.81, 110.00 18.21 S 113.52 21.59, 115.00 21.82 S 118.68 20.53, 120.00 19.81 S 123.57 16.80, 125.00 16.34 S 128.50 16.63, 130.00 16.65 S 133.50 16.46, 135.00 16.50 S 138.54 16.56, 140.00 16.91 S 143.56 18.45, 145.00 18.87 S 148.51 20.02, 150.00 19.82 S 153.54 17.85, 155.00 17.51 S 158.50 17.54, 160.00 17.52 S 163.52 17.11, 165.00 17.33 S 168.64 18.34, 170.00 18.97 S 173.50 21.92, 175.00 21.90 S 178.71 19.62, 180.00 18.86 S 183.51 16.20, 185.00 16.00 S 188.62 16.96, 190.00 17.54 S 193.50 20.21, 195.00 20.24 S 198.51 17.91, 200.00 17.76 S 203.56 18.79, 205.00 19.20"
        fill="none">
        <animate attributeName="stroke-dashoffset"
            from="218.0932785556426" to="0" dur="2.2s"/>
        <animate attributeName="stroke-dasharray"
            from="218.0932785556426" to="218.0932785556426"/>
    </path>
    <circle r="4" cx="5" cy="46" fill="#3023AE"/>
    <circle r="4" cx="205" cy="19.203802071494316" fill="#C86DD7" opacity="0">
        <animate attributeName="opacity"
            from="0" to="1" dur="0.1s" begin="2.2s" fill="freeze"/>
    </circle>
    <g class="interactive-group">
        <rect class="hover-trigger" x="0" y="0" width="210" height="50" />
        
        <circle class="confetti-particle p1" r="1.5" />
        <rect class="confetti-particle p2" width="2" height="3" />
        <circle class="confetti-particle p3" r="1.8" />
        <rect class="confetti-particle p4" width="3" height="1.5" />
        <circle class="confetti-particle p5" r="1.2" />
        <rect class="confetti-particle p6" width="2.5" height="2.5" />
        <circle class="confetti-particle p7" r="2" />
        <rect class="confetti-particle p8" width="3" height="2.2" />
        <circle class="confetti-particle p9" r="1.3" />
        <rect class="confetti-particle p10" width="2" height="3.5" />
        <circle class="confetti-particle p11" r="1.6" />
        <rect class="confetti-particle p12" width="1.5" height="3" />
        <circle class="confetti-particle p13" r="1.4" />
        <rect class="confetti-particle p14" width="2.8" height="2" />
        <circle class="confetti-particle p15" r="1.7" />
        <rect class="confetti-particle p16" width="2" height="2" />

        <g class="star-popup" transform="translate(105, 25)">
            <rect class="popup-bg" x="-28" y="-8" width="56" height="16" />
            <text class="popup-text" dy="3">4,811 stars</text>
        </g>
    </g>
</svg>
