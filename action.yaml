name: 'Starlines'
description: 'Generate a starline SVG for a GitHub repository or gist'

inputs:
  resource:
    description: 'GitHub owner (owner), repository (owner/repo), or gist (owner/gist-id@gist)'
    required: false
    default: ${{ github.repository }}
  output-directory:
    description: 'Relative output directory for output files'
    required: false
    default: 'starlines'
  github-token:
    description: 'GitHub token with read access to the target repository or gist stargazers'
    required: true
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'

    - working-directory: ${{ github.action_path }}
      shell: bash
      run: npm ci

    - shell: bash
      run: mkdir -p "${{ github.workspace }}/${{ inputs.output-directory }}"

    - working-directory: ${{ github.workspace }}/${{ inputs.output-directory }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: node ${{ github.action_path }}/create-starline.js "${{ inputs.resource }}"
